# --------------------------- 侧边栏 start ---------------------------
aside:
  home:
    noSticky: "about"
    Sticky: "allInfo"
  post:
    noSticky: "about"
    Sticky: "newestPost"
  page:
    noSticky: "about"
    Sticky: "newestPost,allInfo"
  position: 1
  card:
    style: 0
    author:
      img: https://pan.811520.xyz/2024-10/1728197294016.webp
      sticker:
    url: /about/
    background:
    content: 这是我的博客
    content2: 一个热爱生活的人
    sayhello:
      morning: ✨ 早上好，又是新的一天
      noon: 午休时间到了
      afternoon: 下午茶 🍵
      night: 早点睡觉
      goodnight: 晚安 😴
    sayhello2:
    information:
      Github: https://github.com/everfu || fab fa-github
      Bilibili: https://space.bilibili.com/1329819902 || fab fa-bilibili
      微信: https://your-wechat-link || fab fa-weixin
      邮箱: mailto:your@email.com || fas fa-envelope
  flip:
    favicon:
    face:
    backface:
    backcolor: "var(--efu-blue)"
  toc:
    post: true
    page: false
    vague: true
  tags:
    enable: true
    limit: 20
    highlight_list:
  archive:
    enable: true
    type: "month"
  siteinfo:
    postcount: true
    wordcount: false
    pv: true
    uv: true
    updatetime: true
    runtimeenable: true
    runtime: "2025-07-20 00:00:00"
# --------------------------- 侧边栏 end ---------------------------

# --------------------------- 页面默认设置 start ---------------------------
page:
  error: true
  tags: true
  categories: true
  archives: 0
  default:
    cover:
# --------------------------- 页面默认设置 end ---------------------------

# --------------------------- 文章默认设置 start ---------------------------
post:
  default:
    top_cover: true
    cover:
    locate: China,hubei
    copyright:
      enable: true
      author:
        url: /about/
        img:
      license: CC BY-NC-SA 4.0
      licenurl: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.zh
  meta:
    date: true
    updated: true
    locate: false
    wordcount: true
    readtime: true
    pv: true
    comment: true
  award:
    enable: false
    appreciators: /about/
    title:
    desc:
    list:
  share:
    enable: true
    list:
      - qq
      - weibo
      - twitter
      - facebook
      - telegram
      - link
      - qrcode
  rss: /atom.xml
  covercolor:
    enable: false
    mode: local
    api: https://api.qjqq.cn/api/Imgcolor?img=
    time: 43200000
  footer:
    enable: false
    desc:
    button:
      enable: true
      name:
      url: /about/
# --------------------------- 文章默认设置 end ---------------------------

# --------------------------- 主题颜色 start ---------------------------
theme_color:
  dark: "#ffc848"
  light: "#425AEF"
# --------------------------- 主题颜色 end ---------------------------

# --------------------------- 显示模式 start ---------------------------
display_mode:
  type: auto
  universe: false
# --------------------------- 显示模式 end ---------------------------

# --------------------------- 字体 start ---------------------------
font:
  font-size: 16px
  code-font-size: 16px
  font-family: "PingFang SC, Hiragino Sans GB, Microsoft YaHei"
  code-font-family: '"monospace", monospace'
# --------------------------- 字体 end ---------------------------

# --------------------------- 背景图片 start ---------------------------
